<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fury Note — Side Drawer Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      gap: 40px;
      padding: 40px 0;
    }

    .label { color: #888; font-size: 13px; letter-spacing: 0.5px; }

    /* 폰 목업 */
    .phone {
      width: 320px;
      height: 640px;
      background: #0D0D0D;
      border-radius: 40px;
      border: 2px solid #2A2A2A;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    /* 상태바 */
    .status-bar {
      height: 32px;
      background: #0D0D0D;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .status-bar .time { color: #F0F0F0; font-size: 11px; font-weight: 600; }
    .status-bar .icons { color: #F0F0F0; font-size: 10px; display: flex; gap: 5px; }

    /* 앱 헤더 */
    .app-header {
      height: 52px;
      background: #111111;
      border-bottom: 1px solid #2A2A2A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .app-title { display: flex; align-items: center; gap: 6px; }
    .app-title-emoji { font-size: 18px; }
    .app-title-text { color: #F0F0F0; font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .app-title-text span { color: #E63946; }

    .hamburger-btn {
      width: 36px;
      height: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .hamburger-btn:hover { background: #1E1E1E; }
    .hamburger-btn .bar {
      width: 20px;
      height: 2px;
      background: #F0F0F0;
      border-radius: 2px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }
    .hamburger-btn.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger-btn.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* 콘텐츠 영역 */
    .content {
      flex: 1;
      background: #0D0D0D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .content-emoji { font-size: 48px; }
    .content-text { color: #444; font-size: 13px; }

    /* 바텀 네비 */
    .bottom-nav-wrapper {
      position: relative;
      flex-shrink: 0;
      height: 80px;
      z-index: 10;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: #111111;
      border-top: 1px solid #2A2A2A;
      display: flex;
      align-items: flex-end;
      padding-bottom: 10px;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      padding-bottom: 2px;
      cursor: pointer;
    }
    .tab-icon { font-size: 20px; line-height: 1; }
    .tab-label { font-size: 9px; color: #555; letter-spacing: -0.3px; white-space: nowrap; }
    .tab-item.fab-tab { position: relative; flex: 1; }
    .fab-button {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #E63946, #9B1D20);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 -4px 16px rgba(230,57,70,0.5), 0 4px 12px rgba(0,0,0,0.4);
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      border: 3px solid #111111;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fab-button:hover {
      box-shadow: 0 -6px 24px rgba(230,57,70,0.7), 0 6px 16px rgba(0,0,0,0.5);
      transform: translateX(-50%) scale(1.05);
    }
    .fab-label {
      font-size: 9px;
      color: #E63946;
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-weight: 700;
    }

    /* 드로어 오버레이 */
    .drawer-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 50;
      pointer-events: none;
      transition: background 0.3s ease;
    }
    .drawer-overlay.open {
      background: rgba(0,0,0,0.6);
      pointer-events: all;
    }

    /* 사이드 드로어 패널 */
    .side-drawer {
      position: absolute;
      top: 0; right: 0;
      width: 72%;
      height: 100%;
      background: #161616;
      border-left: 1px solid #2A2A2A;
      z-index: 51;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }
    .side-drawer.open { transform: translateX(0); }

    /* 드로어 상단 — 사용자 프로필 (아바타 없음) */
    .drawer-profile {
      background: #111111;
      border-bottom: 1px solid #2A2A2A;
      padding: 36px 20px 20px;
      flex-shrink: 0;
    }
    .drawer-profile-name {
      color: #F0F0F0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .drawer-profile-name span {
      color: #666;
      font-size: 13px;
      font-weight: 400;
    }
    .drawer-profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(230,57,70,0.12);
      border: 1px solid rgba(230,57,70,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      color: #E63946;
      font-size: 10px;
      font-weight: 600;
    }

    /* 드로어 메뉴 */
    .drawer-menu {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    .drawer-menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .drawer-menu-item:hover { background: #1E1E1E; }
    .drawer-menu-item:active { background: #222; }
    .drawer-menu-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1E1E1E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .drawer-menu-info { flex: 1; }
    .drawer-menu-name { color: #F0F0F0; font-size: 14px; font-weight: 600; }
    .drawer-menu-sub { color: #666; font-size: 11px; margin-top: 2px; }
    .drawer-menu-arrow { color: #444; font-size: 14px; }
    .drawer-divider { height: 1px; background: #222; margin: 6px 20px; }

    /* 드로어 하단 */
    .drawer-footer {
      padding: 16px 20px;
      border-top: 1px solid #222;
      flex-shrink: 0;
    }
    .drawer-version { color: #444; font-size: 10px; text-align: center; }
  </style>
</head>
<body>

  <p class="label">FURY NOTE — Side Drawer Preview</p>

  <div class="phone">

    <!-- 상태바 -->
    <div class="status-bar">
      <span class="time">5:19</span>
      <div class="icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
    </div>

    <!-- 앱 헤더 -->
    <div class="app-header">
      <div class="app-title">
        <span class="app-title-emoji">🔥</span>
        <span class="app-title-text">Fury <span>Note</span></span>
      </div>
      <div class="hamburger-btn" id="hamburgerBtn" onclick="toggleDrawer()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <!-- 콘텐츠 -->
    <div class="content">
      <div class="content-emoji">🔥</div>
      <div class="content-text">분노를 기록하세요</div>
    </div>

    <!-- 바텀 네비 -->
    <div class="bottom-nav-wrapper">
      <div class="bottom-nav">
        <div class="tab-item fab-tab">
          <div class="fab-button">🔥</div>
          <span class="fab-label">기록</span>
        </div>
        <div class="tab-item">
          <span class="tab-icon">📮</span>
          <span class="tab-label">피드</span>
        </div>
        <div class="tab-item">
          <span class="tab-icon">📊</span>
          <span class="tab-label">통계</span>
        </div>
        <div class="tab-item">
          <span class="tab-icon">🧘</span>
          <span class="tab-label">진정</span>
        </div>
      </div>
    </div>

    <!-- 드로어 오버레이 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- 사이드 드로어 -->
    <div class="side-drawer" id="sideDrawer">

      <!-- 프로필 (아바타 없음) -->
      <div class="drawer-profile">
        <div class="drawer-profile-name">
          화난 호랑이 <span>#4827</span>
        </div>
        <div class="drawer-profile-badge">🔥 분노 기록 12회</div>
      </div>

      <!-- 메뉴 -->
      <div class="drawer-menu">
        <div class="drawer-menu-item">
          <div class="drawer-menu-icon">⚙️</div>
          <div class="drawer-menu-info">
            <div class="drawer-menu-name">설정</div>
            <div class="drawer-menu-sub">닉네임 변경 · 알림 설정</div>
          </div>
          <span class="drawer-menu-arrow">›</span>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-menu-item">
          <div class="drawer-menu-icon">📖</div>
          <div class="drawer-menu-info">
            <div class="drawer-menu-name">앱 가이드</div>
            <div class="drawer-menu-sub">Fury Note 사용 방법</div>
          </div>
          <span class="drawer-menu-arrow">›</span>
        </div>

        <div class="drawer-menu-item">
          <div class="drawer-menu-icon">🧘</div>
          <div class="drawer-menu-info">
            <div class="drawer-menu-name">진정 가이드</div>
            <div class="drawer-menu-sub">감정 조절 카드 · 오늘의 팁</div>
          </div>
          <span class="drawer-menu-arrow">›</span>
        </div>
      </div>

      <!-- 버전 -->
      <div class="drawer-footer">
        <div class="drawer-version">Fury Note v1.0.0</div>
      </div>

    </div>

  </div>

  <script>
    function toggleDrawer() {
      const isOpen = document.getElementById('sideDrawer').classList.contains('open');
      isOpen ? closeDrawer() : openDrawer();
    }
    function openDrawer() {
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('sideDrawer').classList.add('open');
      document.getElementById('hamburgerBtn').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('sideDrawer').classList.remove('open');
      document.getElementById('hamburgerBtn').classList.remove('open');
    }
  </script>

</body>
</html>
