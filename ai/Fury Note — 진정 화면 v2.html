<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fury Note — 진정</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      padding: 40px 20px; gap: 16px;
    }
    .preview-label { color: #888; font-size: 12px; }

    .phone {
      width: 320px; height: 680px;
      background: #0D0D0D;
      border-radius: 40px; border: 2px solid #2A2A2A;
      overflow: hidden; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: flex; flex-direction: column;
    }

    .status-bar {
      height: 32px; background: #111;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0;
    }
    .status-bar .time { color: #F0F0F0; font-size: 11px; font-weight: 600; }
    .status-bar .icons { color: #F0F0F0; font-size: 10px; display: flex; gap: 5px; }

    .app-header {
      height: 52px; background: #111;
      border-bottom: 1px solid #2A2A2A;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; flex-shrink: 0;
    }
    .app-title { display: flex; align-items: center; gap: 6px; }
    .app-title-text { color: #F0F0F0; font-size: 17px; font-weight: 800; letter-spacing: -0.5px; }
    .app-title-text span { color: #E63946; }
    .hamburger-btn {
      width: 36px; height: 36px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px; cursor: pointer;
    }
    .hamburger-btn .bar { width: 20px; height: 2px; background: #F0F0F0; border-radius: 2px; }

    .calm-content {
      flex: 1; overflow-y: auto; padding: 16px 16px 90px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .calm-content::-webkit-scrollbar { display: none; }

    .section-title {
      color: #888; font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
      margin-bottom: -4px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: #222;
    }

    /* ── 리마인드 리스트 ── */
    .remind-list { display: flex; flex-direction: column; gap: 8px; }

    .remind-card {
      background: #161616; border: 1px solid #2A2A2A;
      border-radius: 16px; padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 12px;
      cursor: pointer; transition: border-color 0.2s, opacity 0.3s;
      position: relative; overflow: hidden;
    }
    .remind-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 3px 0 0 3px;
    }
    .remind-card.lv5::before { background: #E63946; }
    .remind-card.lv4::before { background: #FF6B35; }
    .remind-card.lv3::before { background: #FF9A3C; }
    .remind-card.lv2::before { background: #FFD93D; }
    .remind-card:hover { border-color: #444; }
    .remind-card.removing {
      opacity: 0; transform: translateX(30px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .remind-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .remind-body { flex: 1; min-width: 0; }
    .remind-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .remind-category {
      font-size: 10px; font-weight: 700; color: #888;
      background: #222; border-radius: 6px; padding: 2px 7px;
    }
    .remind-time { font-size: 10px; color: #555; margin-left: auto; }
    .remind-text {
      color: #CCCCCC; font-size: 12px; line-height: 1.5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .remind-badge {
      position: absolute; top: 10px; right: 12px;
      background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3);
      border-radius: 8px; padding: 2px 7px;
      font-size: 9px; color: #E63946; font-weight: 700;
    }

    .remind-empty {
      background: #161616; border: 1px dashed #2A2A2A;
      border-radius: 16px; padding: 28px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .remind-empty-icon { font-size: 32px; }
    .remind-empty-text { color: #555; font-size: 12px; text-align: center; line-height: 1.6; }

    /* ── 진정 도구 2열 ── */
    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tool-card {
      background: #161616; border: 1px solid #2A2A2A;
      border-radius: 20px; padding: 18px 14px 16px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .tool-card:hover { border-color: #444; transform: translateY(-1px); }
    .tool-card:active { transform: scale(0.97); }
    .tool-card.breath   { --c: #7EC8E3; }
    .tool-card.timeout  { --c: #A8D8A8; }
    .tool-card.meditate { --c: #C9B8FF; }
    .tool-card.feed     { --c: #FFB347; }
    .tool-card::after {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--c); opacity: 0.06;
    }
    .tool-icon-wrap {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      background: color-mix(in srgb, var(--c) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 20%, transparent);
    }
    .tool-name { color: #F0F0F0; font-size: 13px; font-weight: 800; line-height: 1.2; }
    .tool-desc { color: #666; font-size: 10px; line-height: 1.5; }
    .tool-tag {
      font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 8px;
      color: var(--c);
      background: color-mix(in srgb, var(--c) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 20%, transparent);
    }

    /* 바텀 네비 */
    .bottom-nav {
      height: 72px; background: #111; border-top: 1px solid #2A2A2A;
      display: flex; align-items: flex-end; padding-bottom: 10px;
      flex-shrink: 0; z-index: 10;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      gap: 3px; padding-bottom: 2px; cursor: pointer;
    }
    .tab-icon { font-size: 18px; line-height: 1; }
    .tab-label { font-size: 8px; color: #555; white-space: nowrap; }
    .tab-item.active .tab-label { color: #E63946; }
    .tab-item.fab-tab { position: relative; flex: 1; }
    .fab-button {
      width: 48px; height: 48px;
      background: linear-gradient(145deg, #E63946, #9B1D20);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: 0 -4px 16px rgba(230,57,70,0.5), 0 4px 12px rgba(0,0,0,0.4);
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      border: 3px solid #111; cursor: pointer;
    }
    .fab-label {
      font-size: 8px; color: #E63946; font-weight: 700;
      position: absolute; bottom: 3px; left: 50%;
      transform: translateX(-50%); white-space: nowrap;
    }

    /* ── 모달 오버레이 ── */
    .modal-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      width: 100%; background: #161616;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid #2A2A2A;
      padding: 16px 20px 32px;
      display: flex; flex-direction: column; gap: 14px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px; height: 4px; background: #333;
      border-radius: 2px; margin: 0 auto -2px;
    }
    .modal-title {
      color: #F0F0F0; font-size: 15px; font-weight: 800;
      display: flex; align-items: center; gap: 8px;
    }

    /* 기록 원문 박스 */
    .modal-note-box {
      background: #111; border: 1px solid #222; border-radius: 12px;
      padding: 11px 13px;
      color: #CCCCCC; font-size: 12px; line-height: 1.6;
    }
    .modal-note-meta {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .modal-note-cat {
      font-size: 10px; font-weight: 700; color: #888;
      background: #1E1E1E; border-radius: 6px; padding: 2px 7px;
    }
    .modal-note-time { font-size: 10px; color: #555; }
    .modal-note-lv {
      margin-left: auto; font-size: 10px; color: #E63946; font-weight: 700;
    }

    /* 현재 진정 정도 선택 */
    .calm-level-label {
      color: #AAAAAA; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .calm-level-label span { color: #555; font-size: 11px; font-weight: 400; }

    .calm-level-row {
      display: flex; gap: 6px; justify-content: space-between;
    }
    .level-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 10px 4px;
      background: #111; border: 1.5px solid #222; border-radius: 14px;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .level-btn:hover { border-color: #444; }
    .level-btn.selected { border-color: var(--sel-color); background: color-mix(in srgb, var(--sel-color) 10%, transparent); }
    .level-btn .lv-emoji { font-size: 20px; line-height: 1; }
    .level-btn .lv-label { font-size: 9px; color: #555; font-weight: 600; white-space: nowrap; }
    .level-btn.selected .lv-label { color: var(--sel-color); }

    /* 진정됨 선택 시 특별 강조 */
    .level-btn.calm-ok { --sel-color: #A8D8A8; }
    .level-btn.lv1     { --sel-color: #FFD93D; }
    .level-btn.lv2     { --sel-color: #FF9A3C; }
    .level-btn.lv3     { --sel-color: #FF6B35; }
    .level-btn.lv4     { --sel-color: #E63946; }
    .level-btn.lv5     { --sel-color: #C0392B; }

    /* 저장 버튼 */
    .modal-save-btn {
      width: 100%; padding: 14px; border-radius: 14px;
      background: linear-gradient(135deg, #E63946, #9B1D20);
      border: none; color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .modal-save-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .modal-save-btn.calm-mode {
      background: linear-gradient(135deg, #2E6B3E, #1A4A28);
      border: 1px solid #3A8A4E;
      color: #A8D8A8;
    }
    .modal-close-btn {
      width: 100%; padding: 12px; border-radius: 14px;
      background: #1E1E1E; border: 1px solid #2A2A2A;
      color: #666; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    /* 토스트 */
    .toast {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #2E6B3E; border: 1px solid #3A8A4E;
      color: #A8D8A8; font-size: 12px; font-weight: 700;
      padding: 10px 18px; border-radius: 20px;
      white-space: nowrap; opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <p class="preview-label">FURY NOTE — 진정 화면 v2</p>

  <div class="phone">
    <div class="status-bar">
      <span class="time">6:12</span>
      <div class="icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
    </div>

    <div class="app-header">
      <div class="app-title">
        <span style="font-size:18px">🔥</span>
        <span class="app-title-text">Fury <span>Note</span></span>
      </div>
      <div class="hamburger-btn">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <div class="calm-content">
      <div class="section-title">🔔 리마인드 노트</div>
      <div class="remind-list" id="remindList"></div>

      <div class="section-title">🧘 진정 도구</div>
      <div class="tool-grid">
        <div class="tool-card breath" onclick="openTool('breath')">
          <div class="tool-icon-wrap">🫁</div>
          <div class="tool-name">호흡운동</div>
          <div class="tool-desc">4-7-8 호흡으로<br>심박수를 낮춰요</div>
          <div class="tool-tag">3~5분</div>
        </div>
        <div class="tool-card timeout" onclick="openTool('timeout')">
          <div class="tool-icon-wrap">⏱️</div>
          <div class="tool-name">타임아웃</div>
          <div class="tool-desc">잠깐 멈추고<br>공간을 바꿔봐요</div>
          <div class="tool-tag">10분</div>
        </div>
        <div class="tool-card meditate" onclick="openTool('meditate')">
          <div class="tool-icon-wrap">🌄</div>
          <div class="tool-name">이미지 명상</div>
          <div class="tool-desc">평온한 장면을<br>떠올려 보세요</div>
          <div class="tool-tag">5~10분</div>
        </div>
        <div class="tool-card feed" onclick="openTool('feed')">
          <div class="tool-icon-wrap">💬</div>
          <div class="tool-name">포스팅으로<br>위로받기</div>
          <div class="tool-desc">비슷한 분노를<br>공유한 사람들</div>
          <div class="tool-tag">피드 이동</div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="tab-item fab-tab">
        <div class="fab-button">🔥</div>
        <span class="fab-label">기록</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">📮</span>
        <span class="tab-label">피드</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">📊</span>
        <span class="tab-label">통계</span>
      </div>
      <div class="tab-item active">
        <span class="tab-icon">🧘</span>
        <span class="tab-label">진정</span>
      </div>
    </div>

    <!-- 리마인드 모달 -->
    <div class="modal-overlay" id="remindModal" onclick="handleOverlayClick(event,'remindModal')">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" id="remindModalTitle"></div>
        <div class="modal-note-box" id="remindModalNote"></div>

        <!-- 현재 진정 정도 -->
        <div class="calm-level-label">
          지금 진정 정도는? <span>탭해서 선택</span>
        </div>
        <div class="calm-level-row" id="calmLevelRow">
          <!-- JS로 생성 -->
        </div>

        <button class="modal-save-btn" id="remindSaveBtn" disabled onclick="saveRemind()">
          저장
        </button>
        <button class="modal-close-btn" onclick="closeModal('remindModal')">닫기</button>
      </div>
    </div>

    <!-- 진정 도구 모달 -->
    <div class="modal-overlay" id="toolModal" onclick="handleOverlayClick(event,'toolModal')">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" id="toolModalTitle"></div>
        <div style="color:#AAAAAA;font-size:13px;line-height:1.8" id="toolModalBody"></div>
        <button class="modal-close-btn" onclick="closeModal('toolModal')">닫기</button>
      </div>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    /* ── 데이터 ── */
    let remindData = [
      { id:0, emoji:'🤬', category:'💼 직장', time:'오늘 오후 3시',
        text:'팀장이 또 내 의견을 무시하고 회의에서 망신을 줬다',
        origLv:5, lvClass:'lv5', badge:true },
      { id:1, emoji:'😡', category:'🚗 운전', time:'어제 오후 7시',
        text:'끼어들기 하고 경적까지 울린 차 때문에 너무 화남',
        origLv:4, lvClass:'lv4', badge:false },
      { id:2, emoji:'😠', category:'🧑 사람', time:'2일 전',
        text:'친구가 약속을 또 당일에 취소했다',
        origLv:3, lvClass:'lv3', badge:false },
    ];

    /* 진정 정도 단계 정의: 분노 5단계 + 진정됨 */
    const CALM_LEVELS = [
      { key:'lv5',    emoji:'🤬', label:'아직 분노',  isCalmOk:false },
      { key:'lv4',    emoji:'😡', label:'많이 화남',  isCalmOk:false },
      { key:'lv3',    emoji:'😠', label:'조금 화남',  isCalmOk:false },
      { key:'lv2',    emoji:'😤', label:'약간 불편',  isCalmOk:false },
      { key:'lv1',    emoji:'😒', label:'거의 괜찮',  isCalmOk:false },
      { key:'calm-ok',emoji:'😌', label:'진정됨 ✓',   isCalmOk:true  },
    ];

    let currentRemindId = null;
    let selectedLevel   = null;

    /* ── 리마인드 리스트 렌더 ── */
    function renderRemindList() {
      const list = document.getElementById('remindList');
      if (remindData.length === 0) {
        list.innerHTML = `
          <div class="remind-empty">
            <div class="remind-empty-icon">😌</div>
            <div class="remind-empty-text">리마인드된 노트가 없어요.<br>모두 진정됐군요! 잘 하셨어요 🎉</div>
          </div>`;
        return;
      }
      list.innerHTML = remindData.map(r => `
        <div class="remind-card ${r.lvClass}" id="remind-${r.id}" onclick="openRemind(${r.id})">
          ${r.badge ? '<div class="remind-badge">지금 확인!</div>' : ''}
          <div class="remind-emoji">${r.emoji}</div>
          <div class="remind-body">
            <div class="remind-top">
              <span class="remind-category">${r.category}</span>
              <span class="remind-time">${r.time}</span>
            </div>
            <div class="remind-text">${r.text}</div>
          </div>
        </div>`).join('');
    }

    /* ── 리마인드 모달 열기 ── */
    function openRemind(id) {
      const r = remindData.find(x => x.id === id);
      if (!r) return;
      currentRemindId = id;
      selectedLevel   = null;

      document.getElementById('remindModalTitle').innerHTML =
        `${r.emoji} ${r.category}`;

      document.getElementById('remindModalNote').innerHTML = `
        <div class="modal-note-meta">
          <span class="modal-note-cat">${r.category}</span>
          <span class="modal-note-time">${r.time}</span>
          <span class="modal-note-lv">기록 당시 강도 ${r.origLv}단계</span>
        </div>
        "${r.text}"`;

      /* 진정 단계 버튼 생성 */
      document.getElementById('calmLevelRow').innerHTML = CALM_LEVELS.map(lv => `
        <div class="level-btn ${lv.key}" id="lvBtn_${lv.key}" onclick="selectLevel('${lv.key}', ${lv.isCalmOk})">
          <span class="lv-emoji">${lv.emoji}</span>
          <span class="lv-label">${lv.label}</span>
        </div>`).join('');

      const saveBtn = document.getElementById('remindSaveBtn');
      saveBtn.disabled = true;
      saveBtn.className = 'modal-save-btn';
      saveBtn.textContent = '저장';

      document.getElementById('remindModal').classList.add('open');
    }

    /* ── 진정 단계 선택 ── */
    function selectLevel(key, isCalmOk) {
      selectedLevel = { key, isCalmOk };

      /* 버튼 선택 상태 토글 */
      CALM_LEVELS.forEach(lv => {
        const btn = document.getElementById('lvBtn_' + lv.key);
        if (btn) btn.classList.toggle('selected', lv.key === key);
      });

      /* 저장 버튼 활성화 */
      const saveBtn = document.getElementById('remindSaveBtn');
      saveBtn.disabled = false;
      if (isCalmOk) {
        saveBtn.className = 'modal-save-btn calm-mode';
        saveBtn.innerHTML = '😌 진정됨으로 저장 &amp; 삭제';
      } else {
        saveBtn.className = 'modal-save-btn';
        saveBtn.innerHTML = '💾 현재 상태 저장';
      }
    }

    /* ── 저장 ── */
    function saveRemind() {
      if (!selectedLevel) return;

      if (selectedLevel.isCalmOk) {
        /* 진정됨 → 리스트에서 삭제 */
        closeModal('remindModal');
        const card = document.getElementById('remind-' + currentRemindId);
        if (card) {
          card.classList.add('removing');
          setTimeout(() => {
            remindData = remindData.filter(x => x.id !== currentRemindId);
            renderRemindList();
          }, 380);
        }
        showToast('😌 진정됨으로 저장됐어요! 잘 하셨어요 🎉');
      } else {
        /* 일반 저장 */
        closeModal('remindModal');
        showToast('💾 현재 상태가 저장됐어요');
      }
    }

    /* ── 진정 도구 모달 ── */
    const TOOL_DATA = {
      breath: {
        title:'🫁 호흡운동',
        body:`<strong>4-7-8 호흡법</strong>으로 심박수를 낮춰요.<br><br>
          ① 코로 <strong>4초</strong> 동안 천천히 들이마세요<br>
          ② <strong>7초</strong> 동안 숨을 참으세요<br>
          ③ 입으로 <strong>8초</strong> 동안 천천히 내쉬세요<br><br>
          이 과정을 <strong>3~4회</strong> 반복하면 분노가 가라앉아요.`
      },
      timeout: {
        title:'⏱️ 타임아웃',
        body:`지금 있는 공간에서 <strong>잠깐 벗어나세요.</strong><br><br>
          ① 지금 상황에서 물리적으로 자리를 피하세요<br>
          ② 조용한 곳으로 이동해 <strong>10분</strong>간 혼자 있어요<br>
          ③ 스마트폰도 잠깐 내려놓아요<br><br>
          타임아웃은 도망이 아니라 <strong>감정 조절 전략</strong>이에요.`
      },
      meditate: {
        title:'🌄 이미지 명상',
        body:`눈을 감고 <strong>평온한 장소</strong>를 떠올려요.<br><br>
          ① 눈을 감고 편하게 앉아요<br>
          ② 바다, 숲, 좋아하는 공간을 <strong>생생하게</strong> 상상해요<br>
          ③ 그 공간의 소리, 냄새, 온도를 느껴봐요<br><br>
          5분만 해도 <strong>코르티솔 수치</strong>가 낮아진다는 연구가 있어요.`
      },
      feed: {
        title:'💬 포스팅으로 위로받기',
        body:`나와 비슷한 분노를 겪은 사람들의 이야기를 봐요.<br><br>
          <strong>"나만 이런 게 아니구나"</strong>라는 공감이 분노를 녹여줘요.<br><br>
          피드에서 비슷한 상황의 포스팅을 찾아보거나, 내 이야기를 공유해서 위로를 받아보세요.`
      }
    };

    function openTool(key) {
      const t = TOOL_DATA[key];
      document.getElementById('toolModalTitle').innerHTML = t.title;
      document.getElementById('toolModalBody').innerHTML = t.body;
      document.getElementById('toolModal').classList.add('open');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    function handleOverlayClick(e, id) {
      if (e.target === document.getElementById(id)) closeModal(id);
    }

    /* ── 토스트 ── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* 초기 렌더 */
    renderRemindList();
  </script>
</body>
</html>
